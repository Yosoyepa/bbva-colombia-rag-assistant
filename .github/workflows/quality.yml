name: quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      run_ragas:
        description: "Run opt-in Ragas quality evaluation"
        required: false
        default: "false"

jobs:
  verification:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e ".[test]"
      - name: Run verification suite
        run: pytest tests/verification

  validation-light:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e ".[test]"
      - name: Run light validation suite
        run: pytest tests/validation/system tests/validation/performance tests/validation/resilience tests/validation/persistence tests/validation/rag_quality

  rag-quality:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_ragas == 'true' }}
    env:
      RUN_RAGAS_L2: "1"
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e ".[test]"
      - name: Run opt-in Ragas quality suite
        run: pytest tests/validation/rag_quality
