# Stack completo del sistema RAG BBVA.
#   docker compose up --build
# levanta pgvector + FastAPI + Streamlit con un solo comando.

services:
  db:
    image: pgvector/pgvector:pg17
    container_name: bbva_rag_db
    environment:
      POSTGRES_USER: ${PG_USER:-bbva}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-bbva}
      POSTGRES_DB: ${PG_DATABASE:-bbva_rag}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Esquema idempotente: se ejecuta solo en la primera inicialización del volumen.
      - ./src/infrastructure/persistence/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-bbva} -d ${PG_DATABASE:-bbva_rag}"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    container_name: bbva_rag_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      MODEL_PROVIDER: ${MODEL_PROVIDER:-google}
      LLM_MODEL: ${LLM_MODEL:-gemini-2.5-flash}
      PROVIDER_FALLBACK_ORDER: ${PROVIDER_FALLBACK_ORDER:-google,anthropic,ollama}
      GOOGLE_MODEL: ${GOOGLE_MODEL:-gemini-2.5-flash}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-5-haiku-latest}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      BEDROCK_MODEL_ID: ${BEDROCK_MODEL_ID:-anthropic.claude-3-5-sonnet-20241022-v2:0}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-384}
      CHUNK_SIZE: ${CHUNK_SIZE:-800}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-120}
      TOP_K: ${TOP_K:-5}
      RETRIEVAL_MODE: ${RETRIEVAL_MODE:-dense}
      HYBRID_BM25_WEIGHT: ${HYBRID_BM25_WEIGHT:-0.35}
      HYBRID_DENSE_WEIGHT: ${HYBRID_DENSE_WEIGHT:-0.65}
      RERANK_ENABLED: ${RERANK_ENABLED:-false}
      RERANK_MODEL: ${RERANK_MODEL:-cross-encoder/ms-marco-MiniLM-L-6-v2}
      EMBEDDING_CACHE_ENABLED: ${EMBEDDING_CACHE_ENABLED:-true}
      ANSWER_CACHE_ENABLED: ${ANSWER_CACHE_ENABLED:-false}
      ANSWER_CACHE_TTL_SECONDS: ${ANSWER_CACHE_TTL_SECONDS:-3600}
      N_HISTORY_MESSAGES: ${N_HISTORY_MESSAGES:-6}
      SCRAPE_BASE_URL: ${SCRAPE_BASE_URL:-https://www.bbva.com.co/}
      SCRAPE_START_URLS: ${SCRAPE_START_URLS:-https://www.bbva.com.co/,https://www.bbva.com.co/personas.html,https://www.bbva.com.co/empresas.html}
      SCRAPE_MAX_PAGES: ${SCRAPE_MAX_PAGES:-40}
      SCRAPE_MAX_DEPTH: ${SCRAPE_MAX_DEPTH:-3}
      SCRAPE_ALLOWED_PREFIXES: ${SCRAPE_ALLOWED_PREFIXES:-/personas,/empresas}
      SCRAPE_EXCLUDE_PATTERNS: ${SCRAPE_EXCLUDE_PATTERNS:-aviso-legal,politica-de-cookies,cookies,legal.html}
      SCRAPE_FRESHNESS_HOURS: ${SCRAPE_FRESHNESS_HOURS:-24}
      RESCRAPE_CHANGED_ONLY: ${RESCRAPE_CHANGED_ONLY:-true}
      PG_HOST: db
      PG_PORT: 5432
      PG_USER: ${PG_USER:-bbva}
      PG_PASSWORD: ${PG_PASSWORD:-bbva}
      PG_DATABASE: ${PG_DATABASE:-bbva_rag}
      API_URL: http://localhost:8000
    ports:
      - "${API_PORT:-8000}:8000"
      - "${STREAMLIT_PORT:-8501}:8501"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  pgdata:
